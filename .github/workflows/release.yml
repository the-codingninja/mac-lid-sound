name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app and DMG
        run: bash build.sh

      - name: Create release archive
        run: tar czf hinge-daemon-macos-arm64.tar.gz hinge-daemon sounds/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Door-Hinge.dmg
            hinge-daemon-macos-arm64.tar.gz
          generate_release_notes: true
